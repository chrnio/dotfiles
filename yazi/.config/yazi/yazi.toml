[mgr]
show_hidden = false
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
linemode = "size"
show_symlink = true
scrolloff = 5

[preview]
wrap = "yes"
tab_size = 4
max_width = 1600
max_height = 2000

[opener]

edit = [
    { run = 'nvim "$@"', block = true }
]

pdf = [
    { run = 'papers "$@"', orphan = true }
]

image = [
    { run = 'loupe "$@"', orphan = true }
]

video = [
    { run = 'mpv "$@"', orphan = true }
]

archive = [
    { run = 'file-roller "$@"', orphan = true }
]

[open]

rules = [
    { mime = "text/*", use = "edit" },

    { mime = "application/pdf", use = "pdf" },

    { mime = "image/*", use = "image" },

    { mime = "video/*", use = "video" },

    { mime = "application/zip", use = "archive" },
    { mime = "application/x-tar", use = "archive" },
]
