[main]
term=xterm-256color
font=JetBrainsMono NF Medium:size=12.5
# shell=/usr/bin/zellij
selection-target=clipboard

[scrollback]
lines=10000
multiplier=5

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes

[colors-dark]
foreground=c0caf5
background=1a1b26

regular0=15161e
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=a9b1d6

bright0=414868
bright1=ff899d
bright2=9fe044
bright3=faba4a
bright4=8db0ff
bright5=c7a9ff
bright6=a4daff
bright7=c0caf5

alpha=0.95

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

font-increase=Control+Shift+equal
font-decrease=Control+Shift+minus
font-reset=Control+Shift+0
