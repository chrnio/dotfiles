# =============================================================================
# Main
# =============================================================================
[main]
# Shell multiplexer
shell=tmux -u new-session -A -s main

# Font settings (disabling ligatures via fontfeatures)
font=JetBrainsMono NF Medium:size=10:fontfeatures=-liga
; font-bold=JetBrainsMono NF Bold:size=10:fontfeatures=-liga
; #font-italic=JetBrainsMono NF Medium:size=10:fontfeatures=-liga
; font-bold-italic=JetBrainsMono NF BoldItalic:size=10:fontfeatures=-liga

# Window size and padding (pad=XxY)
initial-window-size-chars=120x34
pad=2x0 center

# =============================================================================
# Scrollback
# =============================================================================
[scrollback]
lines=10000
multiplier=3.0

# =============================================================================
# Cursor
# =============================================================================
[cursor]
style=block
blink=no
# color=<text> <cursor>
color=16181a ffffff

# =============================================================================
# Mouse
# =============================================================================
[mouse]
hide-when-typing=yes
# Copy on select is standard behavior in Wayland/Foot via the primary selection

# =============================================================================
# Bell
# =============================================================================
[bell]
urgent=yes
notify=yes
visual=yes

# =============================================================================
# Colors (Cyberdream Theme + Opacity)
# =============================================================================
[colors]
alpha=0.95
background=000000
foreground=ffffff

# Normal colors (0-7)
regular0=16181a
regular1=ff6e5e
regular2=5eff6c
regular3=f1ff5e
regular4=5ea1ff
regular5=bd5eff
regular6=5ef1ff
regular7=ffffff

# Bright colors (8-15)
bright0=3c4048
bright1=ff6e5e
bright2=5eff6c
bright3=f1ff5e
bright4=5ea1ff
bright5=bd5eff
bright6=5ef1ff
bright7=ffffff

# Selection colors
selection-foreground=ffffff
selection-background=3c4048

# =============================================================================
# Key Bindings
# =============================================================================
[key-bindings]
# Clipboard
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste

# Scrollback
scrollback-up-line=Control+Shift+Up
scrollback-down-line=Control+Shift+Down
scrollback-up-page=Control+Shift+Page_Up
scrollback-down-page=Control+Shift+Page_Down
scrollback-home=Control+Shift+Home
scrollback-end=Control+Shift+End

# Font Size
font-increase=Control+Shift+equal Control+plus Control+KP_Add
font-decrease=Control+Shift+minus Control+minus Control+KP_Subtract
font-reset=Control+Shift+0 Control+0 Control+KP_0

# URLs (Opens URL hints overlay)
show-urls-launch=Control+Shift+e

# Reload Config (Signals Foot to reload)
reload=Control+Shift+f5
