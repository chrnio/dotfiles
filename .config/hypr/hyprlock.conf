# hyprlock.conf
# theme: black minimal / tokyo night accents
# place at ~/.config/hypr/hyprlock.conf

$font       = JetBrainsMono NF Medium
$accent     = rgba(122, 162, 247, 1.0)   # tokyonight blue
$accentFade = rgba(122, 162, 247, 0.25)
$fg         = rgba(192, 202, 245, 0.90)  # tokyonight fg
$fgDim      = rgba(192, 202, 245, 0.40)
$red        = rgba(247, 118, 142, 1.0)   # tokyonight red (wrong password)
$bg         = rgba(13, 13, 18, 1.0)      # near-black, slightly warmer than pure black
$inputBg    = rgba(26, 27, 38, 0.85)     # tokyonight bg_dark

general {
    hide_cursor         = true
    ignore_empty_input  = true
    text_trim           = true
}

animations {
    enabled             = true
    bezier              = smoothOut, 0.36, 0, 0.66, -0.56
    bezier              = smoothIn,  0.25, 1, 0.5,  1
    animation           = fadeIn,  1, 5, smoothIn
    animation           = fadeOut, 1, 3, smoothOut
    animation           = inputFieldColors, 1, 3, smoothIn
    animation           = inputFieldDots,   1, 2, smoothIn
}

# -----------------------------------------------
#  BACKGROUND — pure black, no image, no blur
# -----------------------------------------------

background {
    monitor     =
    color       = rgba(10, 10, 15, 1.0)
    blur_passes = 0
}

# -----------------------------------------------
#  CLOCK — large, centered
# -----------------------------------------------

label {
    monitor     =
    text        = cmd[update:1000] echo "<span font_desc='$font 72' foreground='##c0caf5'>$(date +"%H:%M")</span>"
    color       = $fg
    font_size   = 72
    font_family = $font
    position    = 0, 120
    halign      = center
    valign      = center
}

# -----------------------------------------------
#  DATE
# -----------------------------------------------

label {
    monitor     =
    text        = cmd[update:60000] echo "<span font_desc='$font 16'>$(date +"%A, %d %B %Y")</span>"
    color       = $fgDim
    font_size   = 16
    font_family = $font
    position    = 0, 42
    halign      = center
    valign      = center
}

# -----------------------------------------------
#  INPUT FIELD
# -----------------------------------------------

input-field {
    monitor             =
    size                = 280, 48
    outline_thickness   = 2
    dots_size           = 0.28
    dots_spacing        = 0.20
    dots_center         = true
    dots_rounding       = -1

    outer_color         = $accentFade
    inner_color         = $inputBg
    font_color          = $fg
    font_family         = $font
    font_size           = 14

    fade_on_empty       = true
    fade_timeout        = 1200
    placeholder_text    = <span foreground='##565f89'>enter password</span>

    check_color         = $accent
    fail_color          = $red
    fail_text           = <span foreground='##f7768e'>$FAIL ($ATTEMPTS)</span>
    fail_transition     = 200

    capslock_color      = rgba(224, 175, 104, 1.0)   # tokyonight yellow for caps warning
    numlock_color       = -1
    bothlock_color      = -1
    invert_numlock      = false

    rounding            = 8
    shadow_passes       = 2
    shadow_size         = 4
    shadow_color        = rgba(0, 0, 0, 0.6)
    shadow_boost        = 1.2

    position            = 0, -60
    halign              = center
    valign              = center
}

# -----------------------------------------------
#  USER GREETING
# -----------------------------------------------

label {
    monitor     =
    text        = hi, $USER
    color       = $fgDim
    font_size   = 13
    font_family = $font
    position    = 0, -22
    halign      = center
    valign      = center
}

# -----------------------------------------------
#  HINT
# -----------------------------------------------

label {
    monitor     =
    text        = esc to clear  •  ctrl+u to wipe
    color       = rgba(86, 95, 137, 0.55)
    font_size   = 11
    font_family = $font
    position    = 0, -24
    halign      = center
    valign      = bottom
}
