# =============================================================================
# Catppuccin — Mocha
# https://github.com/catppuccin/tmux
#
# Usage: add to ~/.tmux.conf:
#   source-file ~/.config/tmux/themes/mocha.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Palette
#
#   base        #1e1e2e   main background
#   mantle      #181825   darker bg (under status bar)
#   crust       #11111b   darkest bg
#   surface0    #313244   raised surface
#   surface1    #45475a   border / separator
#   surface2    #585b70   muted border
#   overlay0    #6c7086   comments / dim text
#   overlay1    #7f849c   secondary text
#   overlay2    #9399b2   tertiary text
#   subtext0    #a6adc8   body text
#   subtext1    #bac2de   brighter body text
#   text        #cdd6f4   primary text
#   lavender    #b4befe   accent (soft blue)
#   blue        #89b4fa   primary blue accent
#   sapphire    #74c7ec   info
#   sky         #89dceb   hint / cyan
#   teal        #94e2d5   subtle green-blue
#   green       #a6e3a1   success
#   yellow      #f9e2af   warning
#   peach       #fab387   warning alt / command mode
#   maroon      #eba0ac   soft red
#   red         #f38ba8   error
#   mauve       #cba6f7   special / active accent
#   pink        #f5c2e7   special alt
#   flamingo    #f2cdcd   gentlest pink
#   rosewater   #f5e0dc   highlight
# -----------------------------------------------------------------------------

# Status bar
set -g status-style                 "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length           40
set -g status-right-length          80
set -g status-left                  "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cba6f7]"
set -g status-right                 "#[fg=#6c7086]  #[fg=#cdd6f4]%H:%M  #[fg=#6c7086]|#[fg=#cdd6f4]  %d %b  #[fg=#6c7086]|  #[fg=#cba6f7]#H "

# Window list
setw -g window-status-format        " #[fg=#6c7086]#I#[fg=#45475a]:#[fg=#a6adc8]#W#{?window_zoomed_flag, [Z],} "
setw -g window-status-current-format " #[fg=#cba6f7,bold]#I#[fg=#585b70]:#[fg=#cdd6f4,bold]#W#{?window_zoomed_flag, [Z],} "
setw -g window-status-current-style "bg=#313244"
setw -g window-status-activity-style "fg=#f9e2af"
setw -g window-status-separator     ""

# Panes
set -g pane-border-style            "fg=#45475a"
set -g pane-active-border-style     "fg=#cba6f7"
set -g display-panes-colour         "#45475a"
set -g display-panes-active-colour  "#cba6f7"

# Messages
set -g message-style                "bg=#313244,fg=#cdd6f4"
set -g message-command-style        "bg=#313244,fg=#fab387"
set -g mode-style                   "bg=#45475a,fg=#cdd6f4"

# Clock
set -g clock-mode-colour            "#cba6f7"
