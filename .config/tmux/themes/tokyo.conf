# =============================================================================
# Tokyo Night — Night variant
# https://github.com/folke/tokyonight.nvim
#
# Usage: add to ~/.tmux.conf:
#   source-file ~/.config/tmux/themes/tokyo.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Palette
#
#   bg          #1a1b26   base background
#   bg_dark     #16161e   slightly darker bg (used for inactive windows)
#   bg_highlight #292e42  selection / highlight bg
#   terminal_black #414868
#   fg          #c0caf5   primary text
#   fg_dark     #a9b1d6   secondary text
#   fg_gutter   #3b4261   dim / gutter
#   comment     #565f89   comments / muted
#   blue        #7aa2f7   accent — used for active elements
#   blue1       #2ac3de   cyan-blue
#   cyan        #7dcfff   info / hint
#   green       #9ece6a   success / activity
#   orange      #ff9e64   warning
#   yellow      #e0af68   warning alt / command mode
#   red         #f7768e   error
#   magenta     #bb9af7   special
# -----------------------------------------------------------------------------

# Status bar
set -g status-style                 "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length           40
set -g status-right-length          80
set -g status-left                  "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7]"
set -g status-right                 "#[fg=#565f89]  #[fg=#a9b1d6]%H:%M  #[fg=#565f89]|#[fg=#a9b1d6]  %d %b  #[fg=#565f89]|  #[fg=#7aa2f7]#H "

# Window list
setw -g window-status-format        " #[fg=#565f89]#I#[fg=#3b4261]:#[fg=#a9b1d6]#W#{?window_zoomed_flag, [Z],} "
setw -g window-status-current-format " #[fg=#7aa2f7,bold]#I#[fg=#3b4261]:#[fg=#c0caf5,bold]#W#{?window_zoomed_flag, [Z],} "
setw -g window-status-current-style "bg=#24283b"
setw -g window-status-activity-style "fg=#e0af68"
setw -g window-status-separator     ""

# Panes
set -g pane-border-style            "fg=#3b4261"
set -g pane-active-border-style     "fg=#7aa2f7"
set -g display-panes-colour         "#3b4261"
set -g display-panes-active-colour  "#7aa2f7"

# Messages
set -g message-style                "bg=#3b4261,fg=#c0caf5"
set -g message-command-style        "bg=#3b4261,fg=#e0af68"
set -g mode-style                   "bg=#364a82,fg=#c0caf5"

# Clock
set -g clock-mode-colour            "#7aa2f7"
