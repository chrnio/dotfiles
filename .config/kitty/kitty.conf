include ~/.config/kitty/themes/cyberdream.conf

font_family               JetBrainsMono NF
bold_family               JetBrainsMono NF Bold
italic_family             JetBrainsMono NF Medium
bold_italic_family        JetBrainsMono NF BoldItalic

font_size                 10
disable_ligatures         always

adjust_line_height        1
adjust_column_width       0

# Window
# -----------------------------------------------------------------------------

window_padding_width      0 2
placement_strategy        center
#hide_window_decorations   yes
#background_blur           64
background_opacity         0.85

remember_window_size  no
initial_window_width  800
initial_window_height 500

resize_in_steps           yes
initial_window_width      120c
initial_window_height     34c

# Draw a thin separator between panes when using kitty layouts
# (irrelevant if you only use tmux, but harmless to keep)
draw_minimal_borders      yes
window_border_width       1px
active_border_color       #89b4fa
inactive_border_color     #313244
bell_border_color         #f38ba8

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
linux_display_server x11
scrollback_lines          10000
scrollback_pager          less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0
# scrollback_indicator_opacity 0.0
wheel_scroll_multiplier   5.0
touch_scroll_multiplier   3.0

# -----------------------------------------------------------------------------
# Cursor
# -----------------------------------------------------------------------------

cursor_shape              block
cursor_blink_interval     0
cursor_trail              0
cursor_trail_decay        0.1 0.4
cursor_trail_start_threshold 2
shell_integration         no-cursor

# -----------------------------------------------------------------------------
# Mouse
# -----------------------------------------------------------------------------

copy_on_select            yes
strip_trailing_spaces     smart
focus_follows_mouse       yes
mouse_hide_wait           2.0
pointer_shape_when_grabbed arrow
default_pointer_shape     beam
pointer_shape_when_dragging beam

# Open URLs with your browser on click
open_url_with             default
url_style                 curly
url_color                 #89b4fa
detect_urls               yes
underline_hyperlinks      hover

# -----------------------------------------------------------------------------
# Terminal bell
# -----------------------------------------------------------------------------

enable_audio_bell         no
visual_bell_duration      0.1
visual_bell_color         #f38ba8
window_alert_on_bell      yes

# -----------------------------------------------------------------------------
# Tab bar (kept minimal since you use tmux, but available if needed)
# -----------------------------------------------------------------------------

tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       slanted
tab_bar_min_tabs          2
tab_bar_margin_width      0
active_tab_font_style     bold
inactive_tab_font_style   normal
active_tab_foreground     #1e1e2e
active_tab_background     #89b4fa
inactive_tab_foreground   #6c7086
inactive_tab_background   #181825
tab_bar_background        #181825
tab_title_template        " {index}: {title} "

# -----------------------------------------------------------------------------
# Performance
# -----------------------------------------------------------------------------

repaint_delay             8
input_delay               2
sync_to_monitor           yes

# -----------------------------------------------------------------------------
# Remote control
# -----------------------------------------------------------------------------

allow_remote_control      yes
listen_on                 unix:/tmp/kitty-{kitty_pid}

# -----------------------------------------------------------------------------
# Shell & misc
# -----------------------------------------------------------------------------

confirm_os_window_close   0
editor                    zeditor

close_on_child_death      no
update_check_interval     0

# Notify when a long-running command finishes while kitty is not focused
notify_on_cmd_finish      unfocused 10.0

# -----------------------------------------------------------------------------
# Keyboard shortcuts  -- multiplexer keys are stripped
# -----------------------------------------------------------------------------

clear_all_shortcuts       yes

# Clipboard
map ctrl+shift+c          copy_to_clipboard
map ctrl+shift+v          paste_from_clipboard

# Scrollback
map ctrl+shift+up         scroll_line_up
map ctrl+shift+down       scroll_line_down
map ctrl+shift+page_up    scroll_page_up
map ctrl+shift+page_down  scroll_page_down
map ctrl+shift+home       scroll_home
map ctrl+shift+end        scroll_end
map ctrl+shift+h          show_scrollback

# Font size
map ctrl+shift+equal      change_font_size all +0.5
map ctrl+shift+minus      change_font_size all -0.5
map ctrl+shift+0          change_font_size all 0

# URL hints -- open any URL visible on screen with keyboard
map ctrl+shift+e          open_url_with_hints

# Select and copy visible text via hints
map ctrl+shift+p>f        kitten hints --type path --program @
map ctrl+shift+p>l        kitten hints --type line --program @
map ctrl+shift+p>w        kitten hints --type word --program @
map ctrl+shift+p>h        kitten hints --type hash --program @

# Reload config
map ctrl+shift+f5         load_config_file

# Debug / info
map ctrl+shift+f6         debug_config

# shell tmux -u new-session -A -s main
