general.import = [
  "~/.config/alacritty/themes/tokyonight.toml"
]

[env]
TERM = "xterm-256color"

[window]
opacity = 0.95
padding = { x = 2, y = 0 }
dynamic_padding = false
decorations = "Full"
startup_mode = "Windowed"
dynamic_title = true

[window.dimensions]
columns = 120
lines = 34

[scrolling]
history = 10000
multiplier = 5

[font]
size = 11.0

[font.normal]
family = "Intel One Mono"
style = "Medium"

[font.bold]
family = "Intel One Mono"
style = "Bold"

[font.italic]
family = "Intel One Mono"
style = "Medium Italic"

[font.bold_italic]
family = "Intel One Mono"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "Never" }
unfocused_hollow = false

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[terminal]

[terminal.shell]
program = "/usr/bin/tmux"
args = ["-u", "new-session", "-A", "-s", "main"]

[keyboard]

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "Equals"
mods = "Control|Shift"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control|Shift"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control|Shift"
action = "ResetFontSize"

