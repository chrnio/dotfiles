[main]
term=xterm-256color
include=/home/chrnio/.config/foot/themes/tokyonight.ini
font=MapleMono Normal NF Medium:size=11
#shell=/usr/bin/tmux
selection-target=clipboard

[scrollback]
lines=10000
multiplier=5

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

font-increase=Control+Shift+equal
font-decrease=Control+Shift+minus
font-reset=Control+Shift+0
