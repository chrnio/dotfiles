[buildPlans.ChasevkaTerm]
family = "ChasevkaTerm"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

  [buildPlans.ChasevkaTerm.variants]
  inherits = "ss07"

    [buildPlans.ChasevkaTerm.variants.design]
    j = "narrow-serifed"
    tittle = "round"
    paren = "flat-arc"
    brace = "curly-flat-boundary"
    lig-ltgteq = "slanted"
    lig-single-arrow-bar = "with-notch"

[buildPlans.ChasevkaTerm.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.ChasevkaTerm.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.ChasevkaTerm.widths.Condensed]
shape = 500
menu = 3
css = "condensed"

[buildPlans.ChasevkaTerm.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.ChasevkaTerm.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.ChasevkaTerm.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
