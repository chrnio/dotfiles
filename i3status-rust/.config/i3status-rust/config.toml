icons_format = "{icon}"

[theme]
theme = "native"
# [theme.overrides]
# idle_bg = "#2b2d3a"
# idle_fg = "#ffffff"

[icons]
icons = "awesome4"

[icons.overrides]
bat = ["|E|", "|_|", "|=|", "|F|"]
bat_charging = "|^| "

[[block]]
block = "net"
device = "^w"
format = " $icon {$ssid |} {$ip |}"
missing_format = " $icon Down "
[[block.click]]
button = "left"
cmd = "kitty -e nmtui"

# [[block]]
# block = "custom"
# json = false
# command = "bluetoothctl show | grep -q 'Powered: yes' && echo '' || echo '󰂲'"
# interval = 5
# [[block.click]]
# button = "left"
# cmd = "kitty -e bluetui"

[[block]]
block = "cpu"
info_cpu = 20
warning_cpu = 50
critical_cpu = 90
format = " $icon $utilization "

[[block]]
block = "disk_space"
path = "/"
format = " $icon $used.eng(w:2) | $total.eng(w:2) "
interval = 20

[[block]]
block = "memory"
format = " $icon $mem_used.eng(w:2) | $mem_avail.eng(w:2) "

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "battery"
format = " $icon $percentage "
charging_format = " $icon $percentage "
full_format = " $icon $percentage "
missing_format = ""

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m %R') "
[[block.click]]
button = "left"
cmd = "gnome-clocks"
