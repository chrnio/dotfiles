# =============================================================================
# Monochrome
# =============================================================================

# Palette
#
# bg          #111111
# bg_dark     #0d0d0d
# bg_highlight #1f1f1f
#
# fg          #e5e5e5
# fg_dark     #bdbdbd
# fg_gutter   #555555
# comment     #808080
#
# accent      #ffffff
# muted       #666666
# -----------------------------------------------------------------------------

# Status bar
set -g status-style                 "bg=#111111,fg=#bdbdbd"
set -g status-left-length           40
set -g status-right-length          80

set -g status-left                  "#[bg=#ffffff,fg=#111111,bold] #S #[bg=#111111,fg=#666666]"
set -g status-right                 "#[fg=#666666]%H:%M #[fg=#444444]|#[fg=#bdbdbd] %d %b #[fg=#444444]| #[fg=#ffffff]#H "

# Window list
setw -g window-status-format \
" #[fg=#666666]#I#[fg=#444444]:#[fg=#bdbdbd]#W#{?window_zoomed_flag, [Z],} "

setw -g window-status-current-format \
" #[fg=#ffffff,bold]#I#[fg=#666666]:#[fg=#e5e5e5,bold]#W#{?window_zoomed_flag, [Z],} "

setw -g window-status-current-style "bg=#1f1f1f"
setw -g window-status-activity-style "fg=#ffffff"
setw -g window-status-separator ""

# Panes
set -g pane-border-style            "fg=#333333"
set -g pane-active-border-style     "fg=#ffffff"

set -g display-panes-colour         "#555555"
set -g display-panes-active-colour  "#ffffff"

# Messages
set -g message-style                "bg=#1f1f1f,fg=#e5e5e5"
set -g message-command-style        "bg=#1f1f1f,fg=#ffffff"

# Copy mode
set -g mode-style                   "bg=#2a2a2a,fg=#ffffff"

# Clock
set -g clock-mode-colour            "#ffffff"
