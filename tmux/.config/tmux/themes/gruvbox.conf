# =============================================================================
# Gruvbox Material Dark Hard
# Designed to match gruvbox-material-dark-hard.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Palette
#
# bg          #1d2021
# bg0         #171a1a
# bg1         #282828
# bg2         #3c3836
#
# fg          #d4be98
# fg_dim      #928374
#
# red         #ea6962
# green       #a9b665
# yellow      #d8a657
# blue        #7daea3
# magenta     #d3869b
# cyan        #89b482
# -----------------------------------------------------------------------------

# Status bar
set -g status-style                 "bg=#171a1a,fg=#d4be98"
set -g status-left-length           40
set -g status-right-length          80

set -g status-left                  "#[bg=#7daea3,fg=#171a1a,bold] #S #[bg=#171a1a,fg=#7daea3]"
set -g status-right                 "#[fg=#928374]%H:%M #[fg=#665c54]|#[fg=#d4be98] %d %b #[fg=#665c54]|#[fg=#89b482] #H "

# Window list
setw -g window-status-format         " #[fg=#928374]#I#[fg=#665c54]:#[fg=#a89984]#W#{?window_zoomed_flag, [Z],} "
setw -g window-status-current-format " #[fg=#d8a657,bold]#I#[fg=#928374]:#[fg=#d4be98,bold]#W#{?window_zoomed_flag, [Z],} "

setw -g window-status-style          "bg=#171a1a"
setw -g window-status-current-style  "bg=#282828"

setw -g window-status-activity-style "fg=#a9b665"
setw -g window-status-bell-style     "fg=#ea6962,bold"

setw -g window-status-separator ""

# Panes
set -g pane-border-style            "fg=#3c3836"
set -g pane-active-border-style     "fg=#7daea3"

set -g display-panes-colour         "#665c54"
set -g display-panes-active-colour  "#d8a657"

# Messages
set -g message-style                "bg=#282828,fg=#d4be98"
set -g message-command-style        "bg=#282828,fg=#d8a657"

# Copy mode
set -g mode-style                   "bg=#3c3836,fg=#d4be98"

# Clock
set -g clock-mode-colour            "#7daea3"
