# -----------------------------------------------------------------------------
# Core settings
# -----------------------------------------------------------------------------

# Set prefix to Ctrl+A (screen-style)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Reduce escape-time for neovim / fast key sequences
set -sg escape-time 10

# Enable focus events (used by neovim, etc.)
set -g focus-events on

# Allow terminal titles
set -g set-titles on
set -g set-titles-string "#W"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Mouse support
set -g mouse on

# -----------------------------------------------------------------------------
# Kitty / true color support
# -----------------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",kitty:RGB"

# Kitty graphics protocol passthrough
set -as terminal-features ",xterm-kitty:sixel"
set -g allow-passthrough on

# -----------------------------------------------------------------------------
# Key bindings — windows
# -----------------------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

bind c new-window -c "#{pane_current_path}"

bind -n M-h previous-window
bind -n M-l next-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-< swap-window -t -1 \; previous-window
bind -n M-> swap-window -t +1 \; next-window

bind n command-prompt -I "#W" "rename-window '%%'"

bind & kill-window

# -----------------------------------------------------------------------------
# Key bindings — panes
# -----------------------------------------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r M-H resize-pane -L 1
bind -r M-J resize-pane -D 1
bind -r M-K resize-pane -U 1
bind -r M-L resize-pane -R 1

bind z resize-pane -Z

bind > swap-pane -D
bind < swap-pane -U

bind x kill-pane

bind b break-pane
bind B join-pane

bind Space next-layout

bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

bind S setw synchronize-panes \; display-message \
"synchronize-panes: #{?pane_synchronized,ON,OFF}"

# -----------------------------------------------------------------------------
# Copy mode
# -----------------------------------------------------------------------------

setw -g mode-keys vi

bind Enter copy-mode

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Y   send -X copy-line
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi /   send -X search-forward
bind -T copy-mode-vi ?   send -X search-backward
bind -T copy-mode-vi n   send -X search-again
bind -T copy-mode-vi N   send -X search-reverse

bind p paste-buffer
bind P choose-buffer

# -----------------------------------------------------------------------------
# Appearance
# -----------------------------------------------------------------------------

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g pane-border-lines heavy
set -g display-panes-time 1500

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

source-file ~/.config/tmux/themes/tokyo.conf

# -----------------------------------------------------------------------------
# Miscellaneous bindings
# -----------------------------------------------------------------------------

bind t if-shell 'tmux select-window -t scratch 2>/dev/null' '' \
  'new-window -n scratch'

bind C-l send-keys C-l \; run "sleep 0.1" \; clear-history

bind / command-prompt "new-window 'man %%'"

bind w choose-tree -Zw

bind ? list-keys -N

bind N new-window -n notes "nvim ~/notes.md"
